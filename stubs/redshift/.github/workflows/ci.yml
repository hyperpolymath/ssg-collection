# CI workflow for shift-ssg - RSR-compliant with SHA-pinned actions

name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
env:
  DENO_VERSION: "1.40.0"
jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Syntax Check - Validate all adapter files
  # ─────────────────────────────────────────────────────────────────────────────
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
      - name: Check adapter syntax
        run: "echo \"\U0001F50D Checking adapter syntax...\"\nfor f in adapters/*.js; do\n  node --check \"$f\" || exit 1\ndone\necho \"✅ All adapters pass syntax check\"\n"
      - name: Verify adapter count
        run: "count=$(ls -1 adapters/*.js | wc -l)\necho \"\U0001F4E6 Found $count adapters\"\nif [ \"$count\" -lt 28 ]; then\n  echo \"❌ Expected at least 28 adapters, found $count\"\n  exit 1\nfi\necho \"✅ Adapter count verified\"\n"
  # ─────────────────────────────────────────────────────────────────────────────
  # Lint - Code quality checks
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Deno
        uses: denoland/setup-deno@5fae568d37c3b73449009674875529a984555dd1 # v2.0.0
        with:
          deno-version: ${{ env.DENO_VERSION }}
      - name: Lint adapters
        run: deno lint adapters/ || echo "⚠️ Lint warnings present"
        continue-on-error: true
      - name: Check formatting
        run: deno fmt --check adapters/ || echo "⚠️ Format check skipped"
        continue-on-error: true
  # ─────────────────────────────────────────────────────────────────────────────
  # Security - Secret scanning and security checks
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check for hardcoded secrets
        run: "echo \"\U0001F510 Checking for hardcoded secrets...\"\n\n# Check for passwords\nif grep -rE \"password\\s*=\\s*['\\\"][^'\\\"]+['\\\"]\" adapters/ src/ 2>/dev/null; then\n  echo \"❌ Potential hardcoded password found\"\n  exit 1\nfi\n\n# Check for API keys\nif grep -rE \"(api[_-]?key|apikey)\\s*=\\s*['\\\"][^'\\\"]+['\\\"]\" adapters/ src/ 2>/dev/null; then\n  echo \"❌ Potential API key found\"\n  exit 1\nfi\n\n# Check for secrets\nif grep -rE \"secret\\s*=\\s*['\\\"][^'\\\"]+['\\\"]\" adapters/ src/ 2>/dev/null; then\n  echo \"❌ Potential secret found\"\n  exit 1\nfi\n\necho \"✅ No hardcoded secrets found\"\n"
      - name: Check for dangerous patterns
        run: "echo \"\U0001F50D Checking for dangerous patterns...\"\n\n# Check for eval usage\nif grep -r \"eval(\" adapters/ src/ 2>/dev/null; then\n  echo \"⚠️ eval() usage found - review for security\"\nfi\n\necho \"✅ Dangerous pattern check complete\"\n"
  # ─────────────────────────────────────────────────────────────────────────────
  # Test - Run test suite
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [syntax-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Deno
        uses: denoland/setup-deno@5fae568d37c3b73449009674875529a984555dd1 # v2.0.0
        with:
          deno-version: ${{ env.DENO_VERSION }}
      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests 2>/dev/null)" ]; then
            deno test --allow-all tests/
          else
            echo "⚠️ No tests found - skipping"
          fi
        continue-on-error: true
  # ─────────────────────────────────────────────────────────────────────────────
  # Adapter Validation - Validate adapter interface
  # ─────────────────────────────────────────────────────────────────────────────
  validate-adapters:
    name: Validate Adapters
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [syntax-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate adapter exports
        run: "echo \"\U0001F50D Validating adapter exports...\"\n\nfor adapter in adapters/*.js; do\n  name=$(basename \"$adapter\" .js)\n\n  # Check for required exports\n  if ! grep -q \"export const name\" \"$adapter\"; then\n    echo \"❌ Missing 'name' export in $name\"\n    exit 1\n  fi\n\n  if ! grep -q \"export const tools\" \"$adapter\"; then\n    echo \"❌ Missing 'tools' export in $name\"\n    exit 1\n  fi\n\n  if ! grep -q \"export async function connect\" \"$adapter\"; then\n    echo \"❌ Missing 'connect' function in $name\"\n    exit 1\n  fi\n\n  echo \"✅ $name - valid\"\ndone\n\necho \"✅ All adapters validated\"\n"
  # ─────────────────────────────────────────────────────────────────────────────
  # Documentation Check - Verify required docs exist
  # ─────────────────────────────────────────────────────────────────────────────
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check required documentation
        run: "echo \"\U0001F4DA Checking required documentation...\"\n\nmissing=0\n\n[ -f \"README.adoc\" ] || { echo \"⚠️ README.adoc missing\"; }\n[ -f \"SECURITY.md\" ] || { echo \"❌ SECURITY.md missing\"; missing=1; }\n[ -f \"CONTRIBUTING.md\" ] || { echo \"❌ CONTRIBUTING.md missing\"; missing=1; }\n[ -f \"CODE_OF_CONDUCT.md\" ] || { echo \"❌ CODE_OF_CONDUCT.md missing\"; missing=1; }\n[ -f \"LICENSE.txt\" ] || { echo \"❌ LICENSE.txt missing\"; missing=1; }\n\nif [ $missing -eq 1 ]; then\n  exit 1\nfi\n\necho \"✅ Required documentation present\"\n"
  # ─────────────────────────────────────────────────────────────────────────────
  # CI Summary - Final status
  # ─────────────────────────────────────────────────────────────────────────────
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [syntax-check, lint, security, test, validate-adapters, docs-check]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.syntax-check.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.validate-adapters.result }}" == "failure" ] || \
             [ "${{ needs.docs-check.result }}" == "failure" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ CI complete - all checks passed"
